name: static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pint:
    runs-on: ubuntu-latest
    name: Pint (code style)
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-interaction
      - run: vendor/bin/pint --test

  phpstan:
    runs-on: ubuntu-latest
    name: PHPStan (level 5)
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-interaction
      - run: vendor/bin/phpstan analyse src --level=5 --memory-limit=1G --no-progress
