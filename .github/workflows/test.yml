name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Primary matrix: every supported PHP × Laravel combination on SQLite.
  # SQLite is fast and covers the vast majority of integration paths.
  sqlite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', laravel: '10.*', testbench: '8.*' }
          - { php: '8.2', laravel: '11.*', testbench: '9.*' }
          - { php: '8.2', laravel: '12.*', testbench: '10.*' }
          - { php: '8.3', laravel: '10.*', testbench: '8.*' }
          - { php: '8.3', laravel: '11.*', testbench: '9.*' }
          - { php: '8.3', laravel: '12.*', testbench: '10.*' }
          - { php: '8.4', laravel: '11.*', testbench: '9.*' }
          - { php: '8.4', laravel: '12.*', testbench: '10.*' }

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} / SQLite

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest

  # Real-database smoke tests. We run one PHP/Laravel combo against each
  # production-target engine to verify SKIP LOCKED semantics, timestamp
  # handling, and JSON-column behavior we can't exercise on SQLite.
  mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: outbox_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    name: PHP 8.3 / Laravel 12 / MySQL 8
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          tools: composer:v2
          coverage: none
      - run: |
          composer require \
            "laravel/framework:12.*" \
            "orchestra/testbench:10.*" \
            --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction
      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: outbox_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/pest

  mariadb:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: outbox_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    name: PHP 8.3 / Laravel 12 / MariaDB 11
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          tools: composer:v2
          coverage: none
      - run: |
          composer require \
            "laravel/framework:12.*" \
            "orchestra/testbench:10.*" \
            --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction
      - name: Run tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: outbox_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/pest

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: outbox_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    name: PHP 8.3 / Laravel 12 / PostgreSQL 15
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, bcmath, intl
          tools: composer:v2
          coverage: none
      - run: |
          composer require \
            "laravel/framework:12.*" \
            "orchestra/testbench:10.*" \
            --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction
      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: outbox_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: vendor/bin/pest
